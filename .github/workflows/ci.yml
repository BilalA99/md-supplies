name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · types · tests · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (0 errors)
        # eslint exits non-zero only on errors; the 14 existing warnings are allowed.
        run: npx eslint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        # No secrets are provided: the build must succeed with an empty env.
        # lib/resend.ts is lazy, so a missing RESEND_API_KEY does not break it.
        run: npx next build

      - name: Forbidden-content scan (no committed secrets)
        run: |
          echo "Scanning tracked files for committed secrets…"
          # Real keys must live in .env (gitignored), never in source. These
          # patterns match the provider key prefixes used by this project.
          if git grep -nIE \
            're_[A-Za-z0-9]{20,}|shpat_[A-Za-z0-9]{20,}|shpss_[A-Za-z0-9]{20,}|shpca_[A-Za-z0-9]{20,}' \
            -- ':!*.example' ':!.github/workflows/*'; then
            echo "::error::Possible committed secret (Resend/Shopify key) found above."
            exit 1
          fi
          echo "No committed secrets found."
