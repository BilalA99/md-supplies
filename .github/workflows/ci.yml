name: CI

on:
  push:
    branches: [main, sardor-dev]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: unit
    env:
      SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
      SHOPIFY_STOREFRONT_ACCESS_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Skip E2E if Shopify secrets are not configured
        id: gate
        run: |
          if [ -z "$SHOPIFY_STORE_DOMAIN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - run: npx playwright install --with-deps chromium
        if: steps.gate.outputs.skip == 'false'
      - run: npm run build
        if: steps.gate.outputs.skip == 'false'
      - run: npm run test:e2e
        if: steps.gate.outputs.skip == 'false'
      - uses: actions/upload-artifact@v4
        if: failure() && steps.gate.outputs.skip == 'false'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
